<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Popular Movies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#0b1220] text-gray-200 font-sans">
    <!-- HEADER (same as Home) -->
    <header
      class="sticky top-0 z-[1000] bg-[rgba(11,18,32,0.85)] backdrop-blur-xl border-b border-white/10"
    >
      <div
        class="max-w-[1400px] mx-auto px-3 sm:px-6 lg:px-10 h-14 sm:h-16 flex items-center gap-4"
      >
        <!-- Logo -->
        <a href="/index.html" class="flex items-center gap-2 shrink-0">
          <div
            class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg bg-gradient-to-br from-blue-600 to-blue-900 grid place-items-center text-xs sm:text-sm font-bold"
          >
            MX
          </div>
          <span class="text-xs sm:text-sm font-semibold whitespace-nowrap">
            MovieXplore
          </span>
        </a>

        <!-- Nav -->
        <nav
          class="ml-auto flex items-center gap-4 sm:gap-6 text-xs sm:text-sm whitespace-nowrap overflow-x-auto scrollbar-hide"
        >
          <a href="/index.html" class="text-gray-400 hover:text-white">
            Home
          </a>

          <a
            href="/pages/movies/movie.html"
            class="text-gray-400 hover:text-white"
          >
            Movies
          </a>

          <a
            href="/pages/tvshows/tvshows.html"
            class="text-gray-400 hover:text-white"
          >
            TV Shows
          </a>
        </nav>
      </div>
    </header>

    <!-- PAGE HEADER -->
    <div class="mt-10 mb-10 flex items-center justify-between px-10">
      <!-- Title -->
      <h1 class="text-2xl font-semibold">Popular Movies</h1>

      <!-- Search -->
      <div class="flex gap-2 w-[360px]">
        <input
          id="searchInput"
          type="text"
          placeholder="Search movies or TV shows"
          class="flex-1 px-3 py-2 bg-[#141c2f] border border-[#223a5e] text-sm text-white outline-none placeholder-gray-400 rounded-md"
        />
        <button
          id="searchBtn"
          class="px-4 py-2 bg-[#223a5e] hover:bg-[#2c4a78] text-white text-sm rounded-md"
        >
          Search
        </button>
      </div>
    </div>

    <!-- MOVIE GRID -->
    <main
      id="movies"
      class="px-10 pb-16 grid grid-cols-[repeat(auto-fill,minmax(180px,1fr))] gap-6"
    ></main>

    <script type="module" src="popularmovies.js"></script>
  </body>
</html>

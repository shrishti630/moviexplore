<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-900 text-gray-200 font-sans">
    <!-- HEADER (Home header, no Trending/Favorites) -->
    <header
      class="sticky top-0 z-50 bg-[rgba(11,18,32,0.9)] backdrop-blur-xl border-b border-white/10"
    >
       <div
        class="max-w-[1400px] mx-auto px-3 sm:px-6 lg:px-10 py-2 sm:py-3 flex items-center justify-between gap-4"
      >
        <!-- Logo -->
        <div class="flex items-center gap-2 cursor-pointer">
          <div
            class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg bg-gradient-to-br from-blue-600 to-blue-900 grid place-items-center text-xs sm:text-sm font-bold"
          >
            MX
          </div>
          <span class="text-xs sm:text-sm font-semibold">MovieXplore</span>
        </div>

        <!-- Nav -->
        <nav
          class="flex items-center gap-3 sm:gap-6 text-xs sm:text-sm whitespace-nowrap"
        >
          <a href="/index.html" class="text-gray-400 hover:text-white">
            Home
          </a>

          <a href="/pages/movies/movie.html" class="text-gray-400 hover:text-white">
            Movies
          </a>

          <a
            href="/pages/tvshows/tvshows.html"
            class="text-gray-400 hover:text-white"
          >
            TV Shows
          </a>
        </nav>

       
      </div>
    </header>

    <!-- HERO -->
   <section
    id="hero"
    class="relative
          min-h-[360px] sm:min-h-[420px] md:min-h-[480px]
          bg-cover bg-top md:bg-[center_top_-40px]"
  >
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900/30 to-slate-900/95"></div>

    <div class="relative px-4 sm:px-6 md:px-10">
      <div
        class="grid gap-6
              grid-cols-1
              md:grid-cols-[260px_1fr]
              max-w-[1200px] mx-auto py-6"
      >
        <img
          id="poster"
          class="w-[180px] sm:w-[220px] md:w-[260px]
                mx-auto md:mx-0
                rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.6)]"
        />

        <div class="pt-2 md:pt-6">
          <h1 id="title" class="text-4xl font-semibold mb-2"></h1>

          <p id="meta" class="text-sm text-gray-300 mb-2"></p>

          <p id="tagline" class="italic text-gray-400 mb-4"></p>

          <div class="flex items-center gap-4 mb-4">
            <span id="rating" class="text-sm"></span>
            <span id="runtime" class="text-sm text-gray-300"></span>
          </div>

          <div id="crewTop" class="flex gap-6 text-sm"></div>
          <!-- Trailer (Detail Page) -->
          <div
            id="trailerModal"
            class="mt-6 w-full max-w-[420px] aspect-video
                  rounded-lg overflow-hidden bg-black hidden"
          >
            <button
              id="closeTrailer"
              class="absolute -top-8 right-0 text-sm text-gray-400 hover:text-white"
            >
              Close ✕
            </button>

            <iframe
              id="trailerFrame"
              class="w-full h-full"
              allow="autoplay; encrypted-media"
              allowfullscreen
            ></iframe>
          </div>


        </div>
      </div>
    </section>

    <!-- CONTENT -->
    <section
      class="max-w-[1200px] mx-auto grid grid-cols-[3fr_1.2fr] gap-8 "
    >
      <!-- LEFT -->
      <div class="min-w-0 text-black p-8 bg-white">
        <h2 class="text-xl font-semibold mt-8 mb-2">Overview</h2>
        <p id="overview" class="leading-relaxed"></p>

        <h2 class="text-xl font-semibold mt-6 mb-2">Crew</h2>
        <div id="crew" class="flex gap-6"></div>

        <h2 class="text-xl font-semibold mt-8 mb-2">Cast</h2>

        <div
          id="cast"
          class="flex gap-4 overflow-x-auto pb-2 max-w-full min-w-0 [&::-webkit-scrollbar]:hidden"
        ></div>
      </div>

      <!-- RIGHT -->
      <aside class="w-[360px] shrink-0 p-8">
        <h3 class="mt-6 text-sm font-semibold">Trending Today</h3>
        <div id="trendDay" class="flex gap-2 overflow-x-auto mt-2"></div>

        <h3 class="mt-6 text-sm font-semibold">Trending This Week</h3>
        <div id="trendWeek" class="flex gap-2 overflow-x-auto mt-2"></div>

        <h3 class="mt-6 text-sm font-semibold">Top Rated Movies</h3>
        <div id="topMovies" class="flex gap-2 overflow-x-auto mt-2"></div>

        <h3 class="mt-6 text-sm font-semibold">Top Rated TV</h3>
        <div id="topTV" class="flex gap-2 overflow-x-auto mt-2"></div>
      </aside>
    </section>

    <script type="module" src="detail.js"></script>
  </body>
</html>
